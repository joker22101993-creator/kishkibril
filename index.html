<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kishkibril</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(120deg, #ffe0b2, #b2dfdb);
  overflow:hidden;
  color:#333;
}

h1 {
  text-align:center;
  font-size:120px;
  margin-top:40px;
  background: linear-gradient(90deg, #ff5252, #ffeb3b, #2196f3, #9c27b0);
  -webkit-background-clip: text;
  color: transparent;
  position: relative;
  z-index: 100;
}

.sub {
  text-align:center;
  font-size:40px;
  margin-top:10px;
  font-weight:bold;
  color:#333;
  position: relative;
  z-index: 100;
}

.contact {
  position:absolute;
  bottom:40px;
  left:40px;
  font-size:28px; /* увеличили */
  line-height:1.5;
  font-weight:bold;
  background: rgba(255,255,255,0.8);
  padding:20px;
  border-radius:10px;
  max-width:350px;
  z-index:100;
}

.word {
  position:absolute;
  font-weight:bold;
  opacity:0.8;
  transform-origin:center center;
  transition: all 5s linear;
}
</style>
</head>

<body>

<h1>KISHKIBRIL</h1>
<div class="sub">Kishkibril from MZH</div>

<div class="contact">
Contact Information:<br><br>
Chief Executive Officer of Kishkibril:<br>
Ivan Belmas<br><br>
Executive Director of Kishkibril:<br>
Andrii Hezhenko
</div>

<script>
// хаотичные слова с добавкой "best of the best"
const words = ["best of the best Kishkibril","best of the best WiWiWiiiiii","best of the best Kishkibril","best of the best WiWiWiiiiii","best of the best Kishkibril"];
const totalWords = 120;

for(let i=0;i<totalWords;i++){
  let span = document.createElement("span");
  span.className="word";
  span.innerText = words[Math.floor(Math.random()*words.length)];

  // случайная стартовая позиция
  span.style.left = Math.random()*100 + "vw";
  span.style.top = Math.random()*100 + "vh";

  // случайный размер
  span.style.fontSize = (15 + Math.random()*35) + "px";

  // случайный цвет
  span.style.color = `hsl(${Math.random()*360},70%,50%)`;

  // случайный начальный поворот
  let rot = Math.random()*360 - 180;
  span.style.transform = `rotate(${rot}deg)`;

  document.body.appendChild(span);

  // анимация движения
  function moveWord(){
    let x = Math.random()*100;
    let y = Math.random()*100;
    let angle = Math.random()*360 - 180;
    span.style.left = x + "vw";
    span.style.top = y + "vh";
    span.style.transform = `rotate(${angle}deg)`;
    setTimeout(moveWord, 4000 + Math.random()*3000); // каждые 4-7 секунд
  }
  moveWord();
}
</script>

</body>
</html>
